server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE;MODE=MYSQL;DATABASE_TO_LOWER=TRUE;
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false
spring.h2.console.settings.web-allow-others=false

# SQL Init Mode - disabled, using @Sql instead
spring.sql.init.mode=never

# Task Service Configuration
task-service.url=http://localhost:8090

# Logging Configuration
logging.level.root=ERROR
logging.level.zxf.springboot.demo=DEBUG
logging.level.org.springframework.test.context=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG