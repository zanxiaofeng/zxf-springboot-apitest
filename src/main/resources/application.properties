# Main application - MySQL configuration
server.port=8080

# MySQL Database Configuration (Production)
spring.datasource.url=jdbc:mysql://localhost:3306/demo_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=demo
spring.datasource.password=demo123

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# SQL Init
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/init/schema.sql
spring.sql.init.data-locations=classpath:sql/init/data.sql
spring.sql.init.continue-on-error=false

# Task Service Configuration
task-service.url=http://localhost:8090

# Logging
logging.level.root=INFO
logging.level.zxf.springboot.demo=DEBUG